services:
  - type: web
    name: sdw-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --timeout-keep-alive 30
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BACKEND_ENV
        value: production
    # Health check keeps the free tier warm
    healthCheckPath: /health
    autoDeploy: true
