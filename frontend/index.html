<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="X9gOa8_8H2t1zXNEETS7KbJ7TxSk_H774dpmaBztXjg" />

    <!-- ── Primary SEO ──────────────────────────────────────────────────── -->
    <title>Sreya Digital Wear – Ethnic Wear Inventory & Production Management</title>
    <meta
      name="description"
      content="Sreya Digital Wear – manage your saree, kurti, lehenga and ethnic fashion inventory, production runs, and cloth requirements all in one place."
    />
    <meta
      name="keywords"
      content="Sreya Digital Wear, SDW, ethnic wear inventory, saree management, kurti stock, lehenga production, Indian fashion ERP, ethnic wear business software"
    />
    <meta name="author" content="Sreya Digital Wear" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://sreya-digital-wear.vercel.app/" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn) ────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sreya Digital Wear" />
    <meta property="og:title" content="Sreya Digital Wear – Ethnic Wear Inventory Management" />
    <meta
      property="og:description"
      content="Manage saree, kurti, lehenga inventory, production runs, and cloth requirements for your ethnic fashion business."
    />
    <meta property="og:url" content="https://sreya-digital-wear.vercel.app/" />
    <meta
      property="og:image"
      content="https://sreya-digital-wear.vercel.app/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sreya Digital Wear – Ethnic Wear Inventory Management" />
    <meta
      name="twitter:description"
      content="Manage saree, kurti, lehenga inventory and production for your ethnic fashion business."
    />
    <meta
      name="twitter:image"
      content="https://sreya-digital-wear.vercel.app/og-image.png"
    />

    <!-- ── Favicon ───────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#4a7c59" />

    <!-- ── Structured Data (JSON-LD) ────────────────────────────────────── -->
    <!-- Helps Google understand the business — boosts branded search ranking -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Sreya Digital Wear",
      "alternateName": "SDW",
      "description": "Inventory and production management system for Indian ethnic wear businesses. Manage sarees, kurtis, lehengas, production runs and cloth requirements.",
      "url": "https://sreya-digital-wear.vercel.app",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "creator": {
        "@type": "Organization",
        "name": "Sreya Digital Wear",
        "url": "https://sreya-digital-wear.vercel.app"
      },
      "keywords": "ethnic wear inventory, saree management, kurti stock, Indian fashion ERP, lehenga production management"
    }
    </script>

    <!-- ── Performance: preconnect to external services ────────────────── -->
    <!-- Eliminates DNS + TCP + TLS handshake time for first API call -->
    <link rel="preconnect" href="https://your-render-app.onrender.com" />
    <link rel="dns-prefetch" href="https://your-render-app.onrender.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <!-- Google Fonts preconnect (if you use Google Fonts) -->
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com" /> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
