<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EDE5D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4A882;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8F71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A7056;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  
  <!-- SDW text -->
  <text x="32" y="44" font-family="Georgia, serif" font-size="26" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="-2">
    <tspan fill="url(#gold)">S</tspan><tspan fill="url(#green)">D</tspan><tspan fill="url(#gold)">W</tspan>
  </text>
  
  <!-- Decorative dots -->
  <circle cx="12" cy="52" r="2" fill="url(#gold)" opacity="0.6"/>
  <circle cx="52" cy="52" r="2" fill="url(#gold)" opacity="0.6"/>
</svg>
