<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C4A882;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8F71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A7056;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Diamond ornament left -->
  <polygon points="8,30 14,24 20,30 14,36" fill="url(#goldGrad)" opacity="0.8"/>
  
  <!-- S Letter -->
  <text x="26" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="url(#goldGrad)" letter-spacing="-1">S</text>
  
  <!-- D Letter -->
  <text x="50" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="url(#greenGrad)" letter-spacing="-1">D</text>
  
  <!-- W Letter -->
  <text x="76" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="url(#goldGrad)" letter-spacing="-1">W</text>

  <!-- Decorative line -->
  <line x1="26" y1="46" x2="112" y2="46" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6"/>
  
  <!-- Diamond ornament right -->
  <polygon points="118,30 124,24 130,30 124,36" fill="url(#goldGrad)" opacity="0.8"/>
  
  <!-- Brand name -->
  <text x="140" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#8B7355" letter-spacing="2" font-weight="400">SREYA</text>
  <text x="140" y="40" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#6B8F71" letter-spacing="1.5" font-weight="400">DIGITAL</text>
  <text x="140" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#8B7355" letter-spacing="2.5" font-weight="400">WEAR</text>
</svg>
